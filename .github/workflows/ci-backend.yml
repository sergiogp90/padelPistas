name: CI Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detecta si el PR/push toca el backend. El workflow SIEMPRE se dispara (sin
  # filtro paths) para que el check requerido pueda reportar; el trabajo pesado
  # solo corre si hay cambios relevantes.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      back: ${{ steps.filter.outputs.back }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            back:
              - back/**
              - .github/workflows/ci-backend.yml

  build-test:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.back == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('back/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore PadelPistas.slnx

      - name: Build
        run: dotnet build PadelPistas.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test PadelPistas.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: back/TestResults/
          if-no-files-found: ignore

  # Gate: corre SIEMPRE y es el check que marcas como requerido. Pasa si el
  # build-test se saltó (no se tocó el back) o fue correcto; falla solo si
  # build-test falló o se canceló.
  backend-ci:
    name: Backend CI
    needs: [changes, build-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          result="${{ needs.build-test.result }}"
          echo "build-test result: $result"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "El build/test del backend no pasó."
            exit 1
          fi
          echo "OK (correcto o sin cambios en el backend)."
