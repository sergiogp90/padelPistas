name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detecta si el PR/push toca el front. El workflow SIEMPRE se dispara (sin
  # filtro paths) para que el check requerido pueda reportar; el trabajo pesado
  # solo corre si hay cambios relevantes.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      front: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            front:
              - front/**
              - .github/workflows/ci.yml

  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.front == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: front/coverage/
          if-no-files-found: ignore

  # Gate: corre SIEMPRE y es el check que marcas como requerido. Pasa si el
  # job de tests se saltó (no se tocó el front) o fue correcto; falla solo si
  # los tests fallaron o se cancelaron.
  frontend-ci:
    name: Frontend CI
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          result="${{ needs.test.result }}"
          echo "test result: $result"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "Los tests del frontend no pasaron."
            exit 1
          fi
          echo "OK (correcto o sin cambios en el frontend)."
